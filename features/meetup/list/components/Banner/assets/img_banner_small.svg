<style>
  .bar1, .bar2, .bar3, .bar4, .bar5 {
    opacity: 0;
  }
  .bar1 { animation: fadeIn 0.5s ease-out 1.5s forwards; }
  .bar2 { animation: fadeIn 0.5s ease-out 1.2s forwards; }
  .bar3 { animation: fadeIn 0.5s ease-out 0.9s forwards; }
  .bar4 { animation: fadeIn 0.5s ease-out 0.6s forwards; }
  .bar5 { animation: fadeIn 0.5s ease-out 0.3s forwards; }
 
  .twinkle1 { animation: twinkle 2s ease-in-out infinite; }
  .twinkle2 { animation: twinkle 2s ease-in-out 0.7s infinite; }
  .twinkle3 { animation: twinkle 2s ease-in-out 1.4s infinite; }
 
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
 
  @keyframes swayLeft {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-3deg); }
  }
  @keyframes swayRight {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(3deg); }
  }
 
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
